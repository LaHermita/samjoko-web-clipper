<!DOCTYPE html>
<html lang="es" data-theme="samjoko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/themes.css">
  <link rel="stylesheet" href="../assets/comun.css">
  <link rel="stylesheet" href="../componentes/barra-progreso.css">
  <link rel="stylesheet" href="editor.css">
  <title></title>
</head>
<body>
  <div id="contenedor">
    <header id="encabezadoEditor">
      <h1></h1>
      <button id="botonReescanear" class="boton-icono-editor" aria-label="">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
        </svg>
        <span class="tooltip-editor"></span>
      </button>
    </header>

    <div id="zonaProgreso"></div>

    <div id="panelMetadata" class="oculto">
      <div id="metaFila">
        <span id="metaAutor"></span>
        <span id="metaSeparador" class="meta-sep"></span>
        <span id="metaFecha"></span>
        <span id="metaSeparador2" class="meta-sep"></span>
        <span id="metaFuente"></span>
      </div>
      <a id="metaUrl" href="#" target="_blank" rel="noopener noreferrer"></a>
      <div id="metaTags" class="meta-tags"></div>
      <details id="metaDetalles">
        <summary id="metaDetallesResumen"></summary>
        <div id="metaDetallesContenido">
          <div class="meta-detalle-fila"><span id="etiquetaIdioma" class="meta-detalle-etiqueta"></span><span id="metaIdioma"></span></div>
          <div class="meta-detalle-fila"><span id="etiquetaTipoContenido" class="meta-detalle-etiqueta"></span><span id="metaTipoContenido"></span></div>
          <div class="meta-detalle-fila"><span id="etiquetaTiempoLectura" class="meta-detalle-etiqueta"></span><span id="metaTiempoLectura"></span></div>
        </div>
      </details>
      <div id="zonaNotasPersonales" class="oculto">
        <label for="notasPersonalesInput" id="etiquetaNotas"></label>
        <textarea id="notasPersonalesInput" rows="2"></textarea>
      </div>
    </div>

    <div id="zonaVacia" class="oculto">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" width="48" height="48">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
      </svg>
      <p id="textoVacio"></p>
    </div>

    <div id="zonaBloques" class="oculto">
      <div id="cabeceraBloques">
        <h2></h2>
        <div id="filtrosBloques" class="oculto"></div>
        <div id="accionesBloques">
          <button id="botonSeleccionarTodos" class="boton-accion-bloques"></button>
          <span id="contadorBloques"></span>
        </div>
      </div>
      <div id="listaBloques"></div>
    </div>

    <div id="zonaPrevia" class="oculto">
      <div id="cabeceraPrevia">
        <h2></h2>
        <div id="estadisticasPrevia" class="oculto"></div>
      </div>
      <pre id="textoPrevia"></pre>
    </div>

    <div id="barraAcciones" class="oculto">
      <button id="botonGuardar" class="botonGuardar"></button>
      <button id="botonDescargar"></button>
      <button id="botonCopiar"></button>
    </div>
  </div>

  <div id="zonaToast"></div>

  <script src="../base-datos.js"></script>
  <script src="../componentes/configuracion.js"></script>
  <script src="../componentes/traduccion.js"></script>
  <script src="../componentes/barra-progreso.js"></script>
  <script src="editor.js"></script>
</body>
</html>
