<!doctype html>
<html lang="es" data-theme="samjoko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/themes.css" />
    <link rel="stylesheet" href="../assets/comun.css" />
    <link rel="stylesheet" href="opciones.css" />
    <title></title>
  </head>
  <body>
    <div id="contenedor">
      <main id="cuadriculaConfig" class="cuadricula-config">

        <div class="card tarjeta-marca">
          <div id="iconoMarca">
            <img
              src="../assets/icons/Samjoko-Icono_LowP_128px.png"
              alt="Samjoko"
              width="96"
              height="96"
            />
          </div>
          <div id="infoMarca">
            <h1></h1>
            <h2 id="subtituloPagina"></h2>
          </div>
        </div>

        <section id="seccionGeneral" class="card">
          <div id="cabeceraGeneral" class="cabeceraSeccion">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              width="22"
              height="22"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
              />
            </svg>
            <h3></h3>
          </div>

          <div class="campoConfig">
            <label for="selectorIdioma" id="etiquetaIdioma"></label>
            <select id="selectorIdioma" name="idioma">
              <option value="es"></option>
              <option value="en"></option>
            </select>
          </div>

          <div class="campoConfig">
            <label for="selectorTema" id="etiquetaTema"></label>
            <select id="selectorTema" name="tema" disabled>
              <option value="samjoko"></option>
              <option value="vivero"></option>
              <option value="nautilus"></option>
              <option value="akkoro"></option>
            </select>
          </div>
        </section>

        <section id="seccionCarpeta" class="card">
          <div id="cabeceraSeccion" class="cabeceraSeccion">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              width="22"
              height="22"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z"
              />
            </svg>
            <h3></h3>
          </div>
          <p id="descripcionCarpeta"></p>
          <button id="botonSeleccionar">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              width="18"
              height="18"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 10.5v6m3-3H9m4.06-7.19-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z"
              />
            </svg>
            <span></span>
          </button>
          <div id="infoCarpeta" class="oculto">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              width="22"
              height="22"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
              />
            </svg>
            <div id="detalleCarpeta">
              <span id="etiquetaCarpeta"></span>
              <span id="nombreCarpeta"></span>
            </div>
            <button id="botonLimpiar" aria-label="">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                width="18"
                height="18"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18 18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>

          <div class="campoConfig">
            <label for="entradaSubcarpeta" id="etiquetaSubcarpeta"></label>
            <input
              type="text"
              id="entradaSubcarpeta"
              name="subcarpeta"
              placeholder=""
            />
          </div>
        </section>

        <section id="seccionFormato" class="card tarjeta-formato">
          <div id="cabeceraFormato" class="cabeceraSeccion">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              width="22"
              height="22"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
              />
            </svg>
            <h3></h3>
          </div>

          <div class="campoConfig campoConfig-horizontal">
            <div class="campoInfo">
              <span class="campoEtiqueta"></span>
              <span class="campoDescripcion"></span>
            </div>
            <label class="interruptor">
              <input
                type="checkbox"
                id="interruptorMetadatosFrontales"
                name="usarMetadatosFrontales"
              />
              <span class="interruptor-control"></span>
            </label>
          </div>

          <div id="camposFrontmatter" class="campos-frontmatter oculto">
            <span id="etiquetaCamposFrontmatter"></span>
            <div id="listaCamposFrontmatter"></div>
          </div>
        </section>

      </main>

      <footer id="piePagina">
        <p id="textoAtajos"></p>
        <p id="textoCopyright"></p>
        <p id="textoApoyo">
          <span></span>
          <a
            href="https://ko-fi.com/harpopan"
            target="_blank"
            rel="noopener noreferrer"
            >ko-fi.com/harpopan</a
          >
        </p>
      </footer>
    </div>

    <div id="zonaToast" aria-live="polite"></div>

    <script src="../base-datos.js"></script>
    <script src="../componentes/configuracion.js"></script>
    <script src="../componentes/traduccion.js"></script>
    <script src="opciones.js"></script>
  </body>
</html>
