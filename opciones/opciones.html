<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="opciones.css">
  <title>Samjoko Nav - Opciones</title>
</head>
<body>
  <div id="contenedor">
    <h1>Samjoko Nav — Opciones</h1>

    <section id="seccionCarpeta">
      <h2>Carpeta de destino</h2>
      <p>Seleccioná la carpeta donde se guardarán los archivos Markdown.</p>
      <button id="botonSeleccionar">Seleccionar carpeta...</button>
      <div id="infoCarpeta" class="oculto">
        <p><strong>Carpeta actual:</strong> <span id="nombreCarpeta"></span></p>
        <button id="botonLimpiar">Quitar carpeta</button>
      </div>
      <p id="mensajeEstado"></p>
    </section>
  </div>
  <script src="../base-datos.js"></script>
  <script src="opciones.js"></script>
</body>
</html>
